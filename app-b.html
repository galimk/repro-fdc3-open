<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>App B - FDC3 Context Listener</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; background: #1a1a2e; color: #eee; }
        h1 { font-size: 18px; margin-bottom: 16px; color: #e17055; }
        .card { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 16px; border: 1px solid #0f3460; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .status { font-size: 12px; padding: 4px 8px; border-radius: 12px; display: inline-block; margin-bottom: 12px; }
        .status-connected { background: #1b4332; color: #64ffda; }
        .status-disconnected { background: #3d0000; color: #ff6b6b; }
        .identity { font-family: 'Fira Code', monospace; font-size: 11px; color: #74b9ff; margin-bottom: 12px; }
        #contextLog { background: #0d1b2a; border-radius: 4px; padding: 12px; font-family: 'Fira Code', monospace; font-size: 12px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
        .ctx-entry { margin-bottom: 8px; padding: 8px; border-radius: 4px; background: #1b2838; border-left: 3px solid #64ffda; }
        .ctx-entry .time { color: #aaa; font-size: 10px; }
        .ctx-entry .data { color: #dfe6e9; margin-top: 4px; }
        .counter { font-size: 24px; font-weight: bold; color: #64ffda; }
        .no-context { color: #636e72; font-style: italic; }
    </style>
</head>
<body>
    <h1>App B — FDC3 Context Listener</h1>
    <span id="status" class="status status-disconnected">Waiting for FDC3...</span>
    <div id="identity" class="identity"></div>

    <div class="card">
        <label>Contexts Received</label>
        <div class="counter" id="counter">0</div>
    </div>

    <div class="card">
        <label>Context Log (newest first)</label>
        <div id="contextLog">
            <div class="no-context">No contexts received yet...</div>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const identityEl = document.getElementById('identity');
        const contextLogEl = document.getElementById('contextLog');
        const counterEl = document.getElementById('counter');
        let contextCount = 0;

        function logContext(ctx) {
            contextCount++;
            counterEl.textContent = contextCount;

            const noCtx = contextLogEl.querySelector('.no-context');
            if (noCtx) noCtx.remove();

            const entry = document.createElement('div');
            entry.className = 'ctx-entry';
            entry.innerHTML = `
                <div class="time">#${contextCount} — ${new Date().toLocaleTimeString()}</div>
                <div class="data">${JSON.stringify(ctx, null, 2)}</div>
            `;
            contextLogEl.insertBefore(entry, contextLogEl.firstChild);
        }

        async function ensureFDC3() {
            if (window.fdc3) return window.fdc3;
            if (!window.fin || !window.fdc3) {
                const url = 'https://built-on-openfin.github.io/web-starter/web/v21.0.0/web-client-api/js/web.client.api.bundle.js';
                const webClient = await import(url);
                await webClient.getAPI({ target: window, api: { fin: true, fdc3: true, fdc3Version: '2.0' }, requestConnectOptions: { strategy: 'request-on-failure' } });
            }
            return window.fdc3;
        }

        async function init() {
            try {
                const api = await ensureFDC3();
                if (!api) {
                    statusEl.textContent = 'FDC3 not available';
                    return;
                }

                statusEl.textContent = 'FDC3 Ready — Listening';
                statusEl.className = 'status status-connected';

                // Show identity info for debugging
                if (typeof fin !== 'undefined') {
                    const me = fin.me.identity;
                    identityEl.textContent = `Identity: uuid=${me.uuid}, name=${me.name}`;

                    // Also show interop endpoint
                    try {
                        const info = await fdc3.getInfo();
                        identityEl.textContent += ` | instanceId=${info.appMetadata?.instanceId || 'N/A'}`;
                    } catch (e) { /* ignore */ }
                }

                // Register context listener for fdc3.contact
                const contactListener = await fdc3.addContextListener('fdc3.contact', (ctx) => {
                    console.log('[App B] Received fdc3.contact context:', ctx);
                    logContext(ctx);
                });

                // Also register a wildcard listener to catch anything
                const wildcardListener = await fdc3.addContextListener(null, (ctx) => {
                    if (ctx.type !== 'fdc3.contact') {
                        console.log('[App B] Received other context:', ctx);
                        logContext(ctx);
                    }
                });

                console.log('[App B] Context listeners registered');
            } catch (e) {
                statusEl.textContent = `Error: ${e.message}`;
                console.error('[App B] Init error:', e);
            }
        }

        init();
    </script>
</body>
</html>
